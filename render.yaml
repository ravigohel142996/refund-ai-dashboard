services:
  # ── Backend: FastAPI Python Web Service ────────────────────────────
  - type: web
    name: refund-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # ← Set this manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  # ── Frontend: React + Vite Static Site ─────────────────────────────
  - type: web
    name: refund-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # CRITICAL: SPA fallback — all paths (including /admin) serve index.html
      # This prevents "Not Found" when navigating directly to /admin
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # ← IMPORTANT: Set this to your backend service URL in Render dashboard
      # Example: https://refund-ai-backend.onrender.com
      - key: VITE_API_URL
        sync: false
