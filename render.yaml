services:
  # ── Backend: FastAPI Python Web Service ────────────────────────────
  - type: web
    name: refund-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health

  # ── Frontend: React + Vite Static Site ─────────────────────────────
  - type: web
    name: refund-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # SPA fallback — send all paths to index.html (fixes /admin 404 on Render)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend Render URL, e.g. https://refund-ai-backend.onrender.com
